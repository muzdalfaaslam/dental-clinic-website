  <!-- wall of text -->
  <g fill="#777">
    <rect x="18" y="296" width="324" height="7"/>
    <rect x="18" y="312" width="324" height="7"/>
    <rect x="18" y="328" width="300" height="7"/>
    <rect x="18" y="344" width="324" height="7"/>
    <rect x="18" y="360" width="280" height="7"/>
    <rect x="18" y="376" width="324" height="7"/>
    <rect x="18" y="392" width="240" height="7"/>
  </g>
  <!-- low-res gallery -->
  <rect x="18" y="420" width="100" height="80" fill="#B7AFA6"/>
  <rect x="130" y="420" width="100" height="80" fill="#B7AFA6"/>
  <rect x="242" y="420" width="100" height="80" fill="#B7AFA6"/>
  <text x="180" y="466" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle" opacity="0.7">[ image ]</text>
